name: Release to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.13"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import pathlib
          import sys
          import tomllib

          pyproject = pathlib.Path('pyproject.toml')
          data = tomllib.loads(pyproject.read_text(encoding='utf-8'))
          project_version = data['project']['version']
          tag = '${{ github.ref_name }}'
          expected = f'v{project_version}'
          if not (tag == expected or tag.startswith(f'{expected}rc')):
              print(
                  'Tag/version mismatch: '
                  f'tag={tag} expected={expected} or {expected}rcN'
              )
              sys.exit(1)
          print(f'Tag/version match confirmed: {tag}')
          PY

      - name: Build distributions
        run: |
          rm -rf build dist *.egg-info src/*.egg-info
          uv build

      - name: Check distributions
        run: uv publish --dry-run --no-attestations dist/*

      - name: Upload distributions artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/

  publish-testpypi:
    if: contains(github.ref_name, 'rc')
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pyKES
    permissions:
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.13"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/ dist/*

  publish-pypi:
    if: ${{ !contains(github.ref_name, 'rc') && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: pypi
      url: https://pypi.org/p/pyKES
    permissions:
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.13"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish to PyPI
        run: uv publish dist/*
